<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #0c0f14; color: #e2e4e9; -webkit-font-smoothing: antialiased; }

  input:focus, select:focus { outline: 2px solid rgba(59,130,246,0.4); outline-offset: -1px; }
  button:hover { opacity: 0.88; }

  input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

    .header-inner { flex-direction: column; align-items: flex-start !important; }

    .nav-row .spacer { display: none; }
    .metrics-grid { grid-template-columns: 1fr 1fr !important; }
    .form-grid { grid-template-columns: 1fr !important; }

    .main-pad { padding: 16px !important; }
    .time-row { flex-direction: column !important; }

</head>
<body>
<div id="root"></div>
<script>
var e = React.createElement;
var useState = React.useState, useMemo = React.useMemo, useEffect = React.useEffect;

var CATEGORIES = [
  "Sales & Prospecting","Client Meetings","Submissions & Marketing","Policy Servicing",
  "Account Management","Renewals","Claims","Admin / Email","Team Management",
  "Strategy / Planning","Personal","Other"
];

var QUADRANT_INFO = {
  production: { label:"Production Zone", subtitle:"Keep & Protect", desc:"High value, high energy. This is your genius zone.", color:"#22c55e", bg:"rgba(34,197,94,0.08)", border:"rgba(34,197,94,0.25)" },
  delegation: { label:"Delegation Zone", subtitle:"Train & Hand Off", desc:"High value but drains you. Document SOPs and delegate.", color:"#f59e0b", bg:"rgba(245,158,11,0.08)", border:"rgba(245,158,11,0.25)" },
  investment: { label:"Investment Zone", subtitle:"Develop & Grow", desc:"Energizes you but low value today. Could become production.", color:"#3b82f6", bg:"rgba(59,130,246,0.08)", border:"rgba(59,130,246,0.25)" },
  elimination: { label:"Elimination Zone", subtitle:"Stop or Outsource", desc:"Low value, low energy. Eliminate, automate, or delegate now.", color:"#ef4444", bg:"rgba(239,68,68,0.08)", border:"rgba(239,68,68,0.25)" }
};

var SAMPLE_ENTRIES = [
  { id:1, task:"Cold calling roofing contractors", category:"Sales & Prospecting", startTime:"08:00", endTime:"09:30", hours:1.5, energy:4, value:5, date:"2026-03-17" },
  { id:2, task:"Processing certificates of insurance", category:"Policy Servicing", startTime:"09:30", endTime:"11:30", hours:2, energy:1, value:1, date:"2026-03-17" },
  { id:3, task:"Renewal review meeting with client", category:"Renewals", startTime:"13:00", endTime:"14:00", hours:1, energy:4, value:5, date:"2026-03-17" },
  { id:4, task:"Submitting GL app to markets", category:"Submissions & Marketing", startTime:"08:30", endTime:"10:00", hours:1.5, energy:3, value:4, date:"2026-03-18" },
  { id:5, task:"Responding to endorsement requests", category:"Policy Servicing", startTime:"10:00", endTime:"11:00", hours:1, energy:1, value:2, date:"2026-03-18" },
  { id:6, task:"Training team on renewal process", category:"Team Management", startTime:"14:00", endTime:"15:00", hours:1, energy:3, value:4, date:"2026-03-19" },
  { id:7, task:"Inbox triage and follow-ups", category:"Admin / Email", startTime:"07:30", endTime:"09:30", hours:2, energy:1, value:2, date:"2026-03-19" },
  { id:8, task:"Building prospect list for TX electricians", category:"Sales & Prospecting", startTime:"15:00", endTime:"16:00", hours:1, energy:4, value:5, date:"2026-03-20" },
  { id:9, task:"Pickleball practice with boys", category:"Personal", startTime:"17:00", endTime:"18:30", hours:1.5, energy:5, value:5, date:"2026-03-20" }
];

function getQuadrant(energy, value) {
  if (energy >= 3 && value >= 3) return "production";
  if (energy < 3 && value >= 3) return "delegation";
  if (energy >= 3 && value < 3) return "investment";
  return "elimination";
}

function calcHours(start, end) {
  if (!start || !end) return 0;
  var sp = start.split(":"), ep = end.split(":");
  var sm = parseInt(sp[0])*60 + parseInt(sp[1]);
  var em = parseInt(ep[0])*60 + parseInt(ep[1]);
  var diff = em - sm;
  if (diff <= 0) diff += 1440;
  return Math.round(diff / 15) * 0.25;
}

function fmt12(t) {
  if (!t) return "";
  var p = t.split(":"), h = parseInt(p[0]), m = p[1];
  var ap = h >= 12 ? "PM" : "AM";
  if (h === 0) h = 12; else if (h > 12) h -= 12;
  return h + ":" + m + " " + ap;
}

function getTimeBlock(t) {
  if (!t) return "unknown";
  var h = parseInt(t.split(":")[0]);
  if (h < 6) return "early"; if (h < 9) return "early-morning";
  if (h < 12) return "mid-morning"; if (h < 14) return "midday";
  if (h < 17) return "afternoon"; return "evening";
}

function getBlockLabel(b) {
  return { "early":"Before 6 AM","early-morning":"6-9 AM","mid-morning":"9 AM-12 PM","midday":"12-2 PM","afternoon":"2-5 PM","evening":"After 5 PM" }[b] || b;
}

function loadData() { try { var r = localStorage.getItem("behr-time-audit"); if (r) return JSON.parse(r); } catch(x){} return null; }
function saveData(entries, rate) { try { localStorage.setItem("behr-time-audit", JSON.stringify({ entries:entries, buybackRate:rate, updated:new Date().toISOString() })); } catch(x){} }

function exportCSV(entries) {
  var h = "Task,Category,Date,Start,End,Hours,Energy,Value,Quadrant\n";
  var rows = entries.map(function(en) {
    return ['"'+en.task.replace(/"/g,'""')+'"', en.category, en.date||"", en.startTime||"", en.endTime||"", en.hours, en.energy, en.value, en.category==="Personal"?"personal":getQuadrant(en.energy,en.value)].join(",");
  }).join("\n");
  var blob = new Blob([h+rows], {type:"text/csv"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a"); a.href=url; a.download="time-audit-"+new Date().toISOString().slice(0,10)+".csv"; a.click(); URL.revokeObjectURL(url);
}

// --- Components ---

function RatingDots(props) {
  var dots = [];
  for (var i = 0; i < 5; i++) { (function(idx){
    dots.push(e("button", { key:idx, onClick:function(){props.onChange(idx+1);},
      style:{width:24,height:24,borderRadius:"50%",border:"2px solid "+props.color,background:idx<props.value?props.color:"transparent",cursor:"pointer",transition:"all 0.15s",padding:0}
    }));
  })(i); }
  return e("div", {style:{display:"flex",gap:5}}, dots);
}

function EntryRow(props) {
  var en = props.entry, q = getQuadrant(en.energy, en.value), info = QUADRANT_INFO[q];
  var qLabel = q==="production"?"Keep":q==="delegation"?"Delegate":q==="investment"?"Develop":"Eliminate";
  var timeStr = (en.startTime && en.endTime) ? fmt12(en.startTime)+" - "+fmt12(en.endTime) : "";
  var isPers = en.category === "Personal";
  var tagColor = isPers ? "#a855f7" : info.color;
  var tagBg = isPers ? "rgba(168,85,247,0.1)" : info.bg;
  var tagText = isPers ? "Personal" : qLabel;

  return e("div", {className:"entry-row", style:{background:"#141820",borderRadius:10,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,borderLeft:"3px solid "+tagColor}},
    e("div", {style:{flex:1,minWidth:0}},
      e("div", {style:{fontSize:14,fontWeight:600,color:"#e2e4e9"}}, en.task),
      e("div", {style:{fontSize:12,color:"#6b7084",marginTop:3}}, en.category, en.date?" \u00B7 "+en.date:"", timeStr?" \u00B7 "+timeStr:"")
    ),
    e("div", {style:{textAlign:"center",minWidth:50}},
      e("div", {style:{fontSize:16,fontWeight:700,fontFamily:"JetBrains Mono",color:"#fff"}}, en.hours+"h")
    ),
    e("div", {style:{display:"flex",gap:6,alignItems:"center"}},
      e("span", {style:{fontSize:10,color:"#3b82f6",fontWeight:600}}, "\u26A1"+en.energy),
      e("span", {style:{fontSize:10,color:"#f59e0b",fontWeight:600}}, "$"+en.value)
    ),
    e("div", {style:{fontSize:10,fontWeight:700,color:tagColor,background:tagBg,padding:"4px 8px",borderRadius:6,whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:"0.04em"}}, tagText),
    e("button", {onClick:function(){props.onEdit(en);}, style:{background:"none",border:"none",color:"#6b7084",cursor:"pointer",fontSize:14,padding:4},title:"Edit"}, "\u270E"),
    e("button", {onClick:function(){props.onDelete(en.id);}, style:{background:"none",border:"none",color:"#6b7084",cursor:"pointer",fontSize:16,padding:4},title:"Delete"}, "\u00D7")
  );
}

function QuadrantCard(props) {
  var info = QUADRANT_INFO[props.qKey], items = props.items;
  var hrs = items.reduce(function(s,en){return s+en.hours;},0);
  return e("div", {style:{background:info.bg,border:"1px solid "+info.border,borderRadius:14,padding:20,minHeight:140}},
    e("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}},
      e("h3", {style:{margin:0,fontSize:15,fontWeight:700,color:info.color}}, info.label),
      e("span", {style:{fontSize:13,fontWeight:700,color:info.color,fontFamily:"JetBrains Mono"}}, hrs+"h")
    ),
    e("p", {style:{margin:"0 0 14px",fontSize:11,color:"#8b8fa3",lineHeight:1.4}}, info.subtitle," \u2014 ",info.desc),
    items.length===0 ? e("div",{style:{fontSize:12,color:"#555",fontStyle:"italic"}},"No tasks here") :
    e("div", {style:{display:"flex",flexDirection:"column",gap:6}},
      items.map(function(it){
        var ts = (it.startTime&&it.endTime) ? fmt12(it.startTime)+" - "+fmt12(it.endTime) : "";
        return e("div",{key:it.id,style:{background:"rgba(0,0,0,0.25)",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("div",{style:{flex:1}}, e("span",{style:{fontSize:13,color:"#e2e4e9",fontWeight:500}},it.task), ts?e("span",{style:{fontSize:11,color:"#555",marginLeft:8}},ts):null),
          e("span",{style:{fontSize:12,fontWeight:700,fontFamily:"JetBrains Mono",color:"#8b8fa3"}},it.hours+"h")
        );
      })
    )
  );
}

function ActionSection(props) {
  var info = QUADRANT_INFO[props.qKey]; if (props.items.length===0) return null;
  var hrs = props.items.reduce(function(s,i){return s+i.hours;},0);
  return e("div",{style:{marginBottom:20}},
    e("div",{style:{fontSize:13,fontWeight:700,color:info.color,marginBottom:8}}, props.icon," ",props.label," (",hrs,"h)"),
    props.items.map(function(it){
      var ts = (it.startTime&&it.endTime)?fmt12(it.startTime)+" - "+fmt12(it.endTime):"";
      return e("div",{key:it.id,style:{background:info.bg,border:"1px solid "+info.border,borderRadius:10,padding:"12px 16px",marginBottom:6,display:"flex",justifyContent:"space-between"}},
        e("div",null, e("div",{style:{fontSize:14,fontWeight:600,color:"#e2e4e9"}},it.task), e("div",{style:{fontSize:12,color:"#6b7084",marginTop:2}},it.category,ts?" \u00B7 "+ts:"")),
        e("div",{style:{fontSize:14,fontWeight:700,fontFamily:"JetBrains Mono",color:info.color}},it.hours+"h")
      );
    })
  );
}

function TimeBlockChart(props) {
  var entries = props.entries;
  var blocks = ["early-morning","mid-morning","midday","afternoon","evening"];
  var bd = {}; blocks.forEach(function(b){bd[b]={production:0,delegation:0,investment:0,elimination:0,personal:0};});
  entries.forEach(function(en){
    var bl = getTimeBlock(en.startTime); if(!bd[bl]) return;
    if(en.category==="Personal"){bd[bl].personal+=en.hours;}else{bd[bl][getQuadrant(en.energy,en.value)]+=en.hours;}
  });
  var mx = 0; blocks.forEach(function(b){var t=Object.values(bd[b]).reduce(function(s,v){return s+v;},0); if(t>mx)mx=t;}); if(mx===0)mx=1;

  return e("div",{style:{marginBottom:24,background:"#141820",borderRadius:14,padding:20}},
    e("h3",{style:{fontSize:14,fontWeight:700,color:"#fff",margin:"0 0 16px"}},"Time of Day Breakdown"),
    e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
      blocks.map(function(bl){
        var d=bd[bl], total=Object.values(d).reduce(function(s,v){return s+v;},0);
        return e("div",{key:bl,style:{display:"flex",alignItems:"center",gap:12}},
          e("div",{style:{width:100,fontSize:11,color:"#8b8fa3",fontWeight:500,textAlign:"right",flexShrink:0}},getBlockLabel(bl)),
          e("div",{style:{flex:1,height:24,background:"rgba(255,255,255,0.03)",borderRadius:6,overflow:"hidden",display:"flex"}},
            d.production>0?e("div",{style:{width:(d.production/mx*100)+"%",background:"#22c55e",height:"100%"}}):null,
            d.delegation>0?e("div",{style:{width:(d.delegation/mx*100)+"%",background:"#f59e0b",height:"100%"}}):null,
            d.investment>0?e("div",{style:{width:(d.investment/mx*100)+"%",background:"#3b82f6",height:"100%"}}):null,
            d.elimination>0?e("div",{style:{width:(d.elimination/mx*100)+"%",background:"#ef4444",height:"100%"}}):null,
            d.personal>0?e("div",{style:{width:(d.personal/mx*100)+"%",background:"#a855f7",height:"100%"}}):null
          ),
          e("div",{style:{width:36,fontSize:11,fontWeight:600,fontFamily:"JetBrains Mono",color:"#8b8fa3",textAlign:"right"}},total>0?total+"h":"")
        );
      })
    ),
    e("div",{style:{display:"flex",gap:14,marginTop:12,flexWrap:"wrap"}},
      [["Keep","#22c55e"],["Delegate","#f59e0b"],["Develop","#3b82f6"],["Eliminate","#ef4444"],["Personal","#a855f7"]].map(function(p){
        return e("div",{key:p[0],style:{display:"flex",alignItems:"center",gap:4}}, e("div",{style:{width:8,height:8,borderRadius:2,background:p[1]}}), e("span",{style:{fontSize:10,color:"#6b7084"}},p[0]));
      })
    )
  );
}

// --- Main App ---
function App() {
  var saved = loadData();
  var _en = useState(saved?saved.entries||[]:[]), entries=_en[0], setEntries=_en[1];
  var _rt = useState(saved?saved.buybackRate||"":[]), buybackRate=_rt[0], setBuybackRate=_rt[1];
  var _vw = useState("log"), view=_vw[0], setView=_vw[1];
  var _sf = useState(false), showForm=_sf[0], setShowForm=_sf[1];
  var _us = useState(false), useSample=_us[0], setUseSample=_us[1];
  var _sr = useState(false), showRateCalc=_sr[0], setShowRateCalc=_sr[1];
  var _ar = useState(""), annualRevenue=_ar[0], setAnnualRevenue=_ar[1];
  var _ei = useState(null), editingId=_ei[0], setEditingId=_ei[1];

  var _task = useState(""), task=_task[0], setTask=_task[1];
  var _cat = useState(CATEGORIES[0]), category=_cat[0], setCategory=_cat[1];
  var _st = useState(""), startTime=_st[0], setStartTime=_st[1];
  var _et = useState(""), endTime=_et[0], setEndTime=_et[1];
  var _eg = useState(3), energy=_eg[0], setEnergy=_eg[1];
  var _vl = useState(3), value=_vl[0], setValue=_vl[1];
  var _dt = useState(new Date().toISOString().slice(0,10)), date=_dt[0], setDate=_dt[1];

  var computedHours = calcHours(startTime, endTime);

  useEffect(function(){ saveData(entries, buybackRate); }, [entries, buybackRate]);

  var activeEntries = useSample && entries.length===0 ? SAMPLE_ENTRIES : entries;

  var stats = useMemo(function(){
    var byQ = {production:[],delegation:[],investment:[],elimination:[]};
    var pers = [], totalH = 0, persH = 0;
    activeEntries.forEach(function(en){
      if(en.category==="Personal"){pers.push(en);persH+=en.hours;}
      else{var q=getQuadrant(en.energy,en.value);byQ[q].push(en);}
      totalH+=en.hours;
    });
    var qH = {}; Object.keys(byQ).forEach(function(q){qH[q]=byQ[q].reduce(function(s,en){return s+en.hours;},0);});
    return {byQuadrant:byQ,quadrantHours:qH,totalHours:totalH,personalEntries:pers,totalPersonalHours:persH};
  }, [activeEntries]);

  function resetForm(){setTask("");setCategory(CATEGORIES[0]);setStartTime("");setEndTime("");setEnergy(3);setValue(3);setDate(new Date().toISOString().slice(0,10));setEditingId(null);}

  function addEntry(){
    if(!task||!startTime||!endTime||computedHours<=0)return;
    if(useSample&&entries.length===0)setUseSample(false);
    var entry={task:task,category:category,startTime:startTime,endTime:endTime,hours:computedHours,energy:energy,value:value,date:date};
    if(editingId!==null){setEntries(function(p){return p.map(function(en){return en.id===editingId?Object.assign({},en,entry):en;});});}
    else{entry.id=Date.now();setEntries(function(p){return p.concat([entry]);});}
    resetForm();setShowForm(false);
  }

  function editEntry(en){setTask(en.task);setCategory(en.category);setStartTime(en.startTime||"");setEndTime(en.endTime||"");setEnergy(en.energy);setValue(en.value);setDate(en.date||"");setEditingId(en.id);setShowForm(true);setView("log");}
  function deleteEntry(id){setEntries(function(p){return p.filter(function(en){return en.id!==id;});});}
  function clearAll(){if(!confirm("Clear all data? This can't be undone."))return;setEntries([]);setBuybackRate("");setUseSample(false);localStorage.removeItem("behr-time-audit");}
  function calcRate(){if(annualRevenue){setBuybackRate(Math.round(parseFloat(annualRevenue)/2080).toString());setShowRateCalc(false);}}

  function lbl(t,sub){return e("label",{style:{fontSize:11,fontWeight:600,color:"#6b7084",textTransform:"uppercase",letterSpacing:"0.06em",display:"block",marginBottom:sub?0:6}},t,sub?e("span",{style:{color:"#8b8fa3",fontWeight:400,textTransform:"none",marginLeft:6}},sub):null);}

  var iS = {width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#fff",fontSize:14,fontFamily:"inherit"};
  var sS = {width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"#0c0f14",color:"#e2e4e9",fontSize:14};
  var tS = {width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"#0c0f14",color:"#e2e4e9",fontSize:14,fontFamily:"JetBrains Mono"};

  var canAdd = task && startTime && endTime && computedHours > 0;

  return e("div",{style:{minHeight:"100vh"}},

    // HEADER
    e("div",{style:{background:"linear-gradient(135deg, #0c0f14 0%, #1a1f2e 100%)",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"28px 32px 20px"}},
      e("div",{className:"header-inner",style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}},
        e("div",null,
          e("h1",{style:{margin:0,fontSize:26,fontWeight:700,letterSpacing:"-0.03em",color:"#fff"}},"Time Audit"),
          e("p",{style:{margin:"6px 0 0",fontSize:14,color:"#8b8fa3"}},"Track your tasks. Find what to delegate, eliminate, or protect.")
        ),
        buybackRate?e("div",{style:{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:10,padding:"10px 16px",textAlign:"right"}},
          e("div",{style:{fontSize:11,color:"#22c55e",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}},"Buyback Rate"),
          e("div",{style:{fontSize:22,fontWeight:700,color:"#22c55e",fontFamily:"JetBrains Mono"}},"$"+parseInt(buybackRate).toLocaleString()+"/hr")
        ):null
      ),
      e("div",{className:"nav-row",style:{display:"flex",gap:4,marginTop:20,alignItems:"center"}},
        [{key:"log",label:"Activity Log"},{key:"matrix",label:"Buyback Matrix"},{key:"summary",label:"Action Plan"}].map(function(tab){
          return e("button",{key:tab.key,onClick:function(){setView(tab.key);},style:{padding:"8px 18px",borderRadius:8,border:"none",background:view===tab.key?"rgba(255,255,255,0.1)":"transparent",color:view===tab.key?"#fff":"#6b7084",fontSize:13,fontWeight:600,cursor:"pointer"}},tab.label);
        }),
        e("div",{className:"spacer",style:{flex:1}}),
        activeEntries.length>0?e("button",{onClick:function(){exportCSV(activeEntries);},style:{padding:"8px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#8b8fa3",fontSize:12,fontWeight:500,cursor:"pointer"}},"\u2B07 Export CSV"):null,
        e("button",{onClick:function(){setShowRateCalc(true);},style:{padding:"8px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#8b8fa3",fontSize:12,fontWeight:500,cursor:"pointer"}},buybackRate?"Recalculate Rate":"Set Buyback Rate"),
        activeEntries.length>0?e("button",{onClick:clearAll,style:{padding:"8px 14px",borderRadius:8,border:"1px solid rgba(239,68,68,0.2)",background:"transparent",color:"#6b7084",fontSize:12,fontWeight:500,cursor:"pointer"}},"Clear All"):null
      )
    ),

    e("div",{className:"main-pad",style:{padding:"24px 32px",maxWidth:960,margin:"0 auto"}},

      // RATE MODAL
      showRateCalc?e("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100},onClick:function(){setShowRateCalc(false);}},
        e("div",{onClick:function(ev){ev.stopPropagation();},style:{background:"#1a1f2e",borderRadius:16,padding:32,width:400,maxWidth:"90vw",border:"1px solid rgba(255,255,255,0.08)"}},
          e("h3",{style:{margin:"0 0 8px",fontSize:18,fontWeight:700,color:"#fff"}},"Calculate Your Buyback Rate"),
          e("p",{style:{margin:"0 0 20px",fontSize:13,color:"#8b8fa3",lineHeight:1.5}},"Your annual earnings / 2,080 working hours. Any task you can hire out for less than this rate should be delegated."),
          lbl("Annual Earnings (or target)"),
          e("div",{style:{display:"flex",gap:10,marginTop:8}},
            e("input",{type:"number",value:annualRevenue,onChange:function(ev){setAnnualRevenue(ev.target.value);},placeholder:"e.g. 250000",onKeyDown:function(ev){if(ev.key==="Enter")calcRate();},style:{flex:1,padding:"10px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.04)",color:"#fff",fontSize:16,fontFamily:"JetBrains Mono"}}),
            e("button",{onClick:calcRate,style:{padding:"10px 20px",borderRadius:8,border:"none",background:"#22c55e",color:"#000",fontWeight:700,fontSize:14,cursor:"pointer"}},"Calculate")
          )
        )
      ):null,

      // LOG VIEW
      view==="log"?e("div",null,
        activeEntries.length===0&&!showForm?e("div",{style:{textAlign:"center",padding:"60px 20px",color:"#6b7084"}},
          e("div",{style:{fontSize:40,marginBottom:16}},"\u23F1"),
          e("p",{style:{fontSize:16,fontWeight:600,color:"#8b8fa3",margin:"0 0 8px"}},"Start your 2-week time audit"),
          e("p",{style:{fontSize:13,margin:"0 0 24px",lineHeight:1.6,maxWidth:420,marginLeft:"auto",marginRight:"auto"}},"Log every task with start and end times. Rate energy and value to see what to delegate."),
          e("div",{style:{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}},
            e("button",{onClick:function(){setShowForm(true);},style:{padding:"12px 24px",borderRadius:10,border:"none",background:"#22c55e",color:"#000",fontWeight:700,fontSize:14,cursor:"pointer"}},"+  Log First Task"),
            e("button",{onClick:function(){setUseSample(true);},style:{padding:"12px 24px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"#8b8fa3",fontWeight:600,fontSize:14,cursor:"pointer"}},"Load Sample Data")
          )
        ):null,

        (activeEntries.length>0||showForm)?e("div",null,
          !showForm?e("button",{onClick:function(){resetForm();setShowForm(true);},style:{padding:"10px 20px",borderRadius:10,border:"none",background:"#22c55e",color:"#000",fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:20}},"+  Log Task"):null,

          // FORM
          showForm?e("div",{style:{background:"#141820",borderRadius:14,padding:24,border:"1px solid rgba(255,255,255,0.08)",marginBottom:24}},
            e("div",{className:"form-grid",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}},

              e("div",{style:{gridColumn:"1 / -1"}}, lbl("What were you doing?"),
                e("input",{value:task,onChange:function(ev){setTask(ev.target.value);},placeholder:"e.g. Processing COIs for client",style:iS})
              ),

              e("div",null, lbl("Category"),
                e("select",{value:category,onChange:function(ev){setCategory(ev.target.value);},style:sS}, CATEGORIES.map(function(c){return e("option",{key:c,value:c},c);}))
              ),

              e("div",null, lbl("Date"),
                e("input",{type:"date",value:date,onChange:function(ev){setDate(ev.target.value);},style:sS})
              ),

              // TIME ROW
              e("div",{style:{gridColumn:"1 / -1"}},
                e("div",{className:"time-row",style:{display:"flex",gap:16,alignItems:"flex-end"}},
                  e("div",{style:{flex:1}}, lbl("Start Time"),
                    e("input",{type:"time",value:startTime,onChange:function(ev){setStartTime(ev.target.value);},style:tS})
                  ),
                  e("div",{style:{flex:1}}, lbl("End Time"),
                    e("input",{type:"time",value:endTime,onChange:function(ev){setEndTime(ev.target.value);},style:tS})
                  ),
                  e("div",{style:{minWidth:80,textAlign:"center",paddingBottom:4}},
                    computedHours>0
                      ?e("div",null,
                        e("div",{style:{fontSize:10,color:"#6b7084",fontWeight:600,textTransform:"uppercase",marginBottom:4}},"Duration"),
                        e("div",{style:{fontSize:22,fontWeight:700,fontFamily:"JetBrains Mono",color:"#22c55e"}},computedHours+"h")
                      )
                      :e("div",{style:{fontSize:10,color:"#555"}},"Set times")
                  )
                )
              ),

              e("div",null, lbl("Energy Level","(drains me \u2190 \u2192 fires me up)"),
                e("div",{style:{marginTop:8}},e(RatingDots,{value:energy,onChange:setEnergy,color:"#3b82f6"}))
              ),
              e("div",null, lbl("Revenue Value","(low impact \u2190 \u2192 high impact)"),
                e("div",{style:{marginTop:8}},e(RatingDots,{value:value,onChange:setValue,color:"#f59e0b"}))
              )
            ),
            e("div",{style:{display:"flex",gap:10,marginTop:20}},
              e("button",{onClick:addEntry,disabled:!canAdd,style:{padding:"10px 24px",borderRadius:8,border:"none",background:canAdd?"#22c55e":"#2a2f3a",color:canAdd?"#000":"#555",fontWeight:700,fontSize:13,cursor:canAdd?"pointer":"default"}},editingId?"Update Task":"Add Task"),
              e("button",{onClick:function(){setShowForm(false);resetForm();},style:{padding:"10px 18px",borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"#8b8fa3",fontWeight:500,fontSize:13,cursor:"pointer"}},"Cancel")
            )
          ):null,

          e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
            activeEntries.map(function(en){return e(EntryRow,{key:en.id,entry:en,onEdit:editEntry,onDelete:deleteEntry});})
          )
        ):null
      ):null,

      // MATRIX VIEW
      view==="matrix"?e("div",null,
        activeEntries.length===0
          ?e("div",{style:{textAlign:"center",padding:60,color:"#6b7084"}},"Log some tasks first to see your matrix.")
          :e("div",null,
              e(TimeBlockChart,{entries:activeEntries}),

              stats.totalHours>0?e("div",{style:{marginBottom:24}},
                e("div",{style:{display:"flex",borderRadius:8,overflow:"hidden",height:32}},
                  ["production","delegation","investment","elimination"].map(function(q){
                    var pct=(stats.quadrantHours[q]/stats.totalHours)*100; if(pct===0)return null;
                    return e("div",{key:q,style:{width:pct+"%",background:QUADRANT_INFO[q].color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#000",minWidth:pct>8?"auto":0,overflow:"hidden"}},pct>10?Math.round(pct)+"%":"");
                  }),
                  stats.totalPersonalHours>0?e("div",{style:{width:(stats.totalPersonalHours/stats.totalHours*100)+"%",background:"#a855f7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}},Math.round(stats.totalPersonalHours/stats.totalHours*100)>10?Math.round(stats.totalPersonalHours/stats.totalHours*100)+"%":""):null
                ),
                e("div",{style:{display:"flex",gap:16,marginTop:10,flexWrap:"wrap"}},
                  ["production","delegation","investment","elimination"].map(function(q){
                    return e("div",{key:q,style:{display:"flex",alignItems:"center",gap:6}}, e("div",{style:{width:10,height:10,borderRadius:3,background:QUADRANT_INFO[q].color}}), e("span",{style:{fontSize:12,color:"#8b8fa3"}},QUADRANT_INFO[q].label+": "+stats.quadrantHours[q]+"h"));
                  }),
                  stats.totalPersonalHours>0?e("div",{style:{display:"flex",alignItems:"center",gap:6}}, e("div",{style:{width:10,height:10,borderRadius:3,background:"#a855f7"}}), e("span",{style:{fontSize:12,color:"#8b8fa3"}},"Personal: "+stats.totalPersonalHours+"h")):null
                )
              ):null,

              e("div",{className:"grid-2col",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
                ["production","delegation","investment","elimination"].map(function(q){return e(QuadrantCard,{key:q,qKey:q,items:stats.byQuadrant[q]});})
              ),

              stats.personalEntries.length>0?e("div",{style:{marginTop:12,background:"rgba(168,85,247,0.08)",border:"1px solid rgba(168,85,247,0.25)",borderRadius:14,padding:20}},
                e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}},
                  e("h3",{style:{margin:0,fontSize:15,fontWeight:700,color:"#a855f7"}},"Personal Time"),
                  e("span",{style:{fontSize:13,fontWeight:700,color:"#a855f7",fontFamily:"JetBrains Mono"}},stats.totalPersonalHours+"h")
                ),
                e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
                  stats.personalEntries.map(function(it){
                    var ts=(it.startTime&&it.endTime)?fmt12(it.startTime)+" - "+fmt12(it.endTime):"";
                    return e("div",{key:it.id,style:{background:"rgba(0,0,0,0.25)",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
                      e("div",{style:{flex:1}}, e("span",{style:{fontSize:13,color:"#e2e4e9",fontWeight:500}},it.task), ts?e("span",{style:{fontSize:11,color:"#555",marginLeft:8}},ts):null),
                      e("span",{style:{fontSize:12,fontWeight:700,fontFamily:"JetBrains Mono",color:"#a855f7"}},it.hours+"h")
                    );
                  })
                )
              ):null
            )
      ):null,

      // SUMMARY VIEW
      view==="summary"?e("div",null,
        activeEntries.length===0
          ?e("div",{style:{textAlign:"center",padding:60,color:"#6b7084"}},"Log some tasks first.")
          :e("div",null,
              e("div",{className:"metrics-grid",style:{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))",gap:12,marginBottom:28}},
                e("div",{style:{background:"#141820",borderRadius:12,padding:"18px 20px"}},
                  e("div",{style:{fontSize:11,color:"#6b7084",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}},"Total Hours"),
                  e("div",{style:{fontSize:28,fontWeight:700,color:"#fff",fontFamily:"JetBrains Mono"}},stats.totalHours)
                ),
                e("div",{style:{background:"#141820",borderRadius:12,padding:"18px 20px"}},
                  e("div",{style:{fontSize:11,color:"#ef4444",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}},"Hours to Reclaim"),
                  e("div",{style:{fontSize:28,fontWeight:700,color:"#ef4444",fontFamily:"JetBrains Mono"}},stats.quadrantHours.elimination+stats.quadrantHours.delegation)
                ),
                e("div",{style:{background:"#141820",borderRadius:12,padding:"18px 20px"}},
                  e("div",{style:{fontSize:11,color:"#22c55e",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}},"Production Zone %"),
                  e("div",{style:{fontSize:28,fontWeight:700,color:"#22c55e",fontFamily:"JetBrains Mono"}},(stats.totalHours-stats.totalPersonalHours)>0?Math.round((stats.quadrantHours.production/(stats.totalHours-stats.totalPersonalHours))*100)+"%":"0%")
                ),
                buybackRate?e("div",{style:{background:"#141820",borderRadius:12,padding:"18px 20px"}},
                  e("div",{style:{fontSize:11,color:"#f59e0b",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}},"Cost of Delegatable Time"),
                  e("div",{style:{fontSize:28,fontWeight:700,color:"#f59e0b",fontFamily:"JetBrains Mono"}},"$"+((stats.quadrantHours.elimination+stats.quadrantHours.delegation)*parseInt(buybackRate)).toLocaleString())
                ):null,
                stats.totalPersonalHours>0?e("div",{style:{background:"#141820",borderRadius:12,padding:"18px 20px"}},
                  e("div",{style:{fontSize:11,color:"#a855f7",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}},"Personal Time"),
                  e("div",{style:{fontSize:28,fontWeight:700,color:"#a855f7",fontFamily:"JetBrains Mono"}},stats.totalPersonalHours+"h")
                ):null
              ),
              e("h3",{style:{fontSize:16,fontWeight:700,color:"#fff",margin:"0 0 14px"}},"Immediate Actions"),
              e(ActionSection,{qKey:"elimination",items:stats.byQuadrant.elimination,icon:"\uD83D\uDED1",label:"Eliminate or Outsource"}),
              e(ActionSection,{qKey:"delegation",items:stats.byQuadrant.delegation,icon:"\uD83D\uDD04",label:"Delegate with SOPs"}),
              e(ActionSection,{qKey:"production",items:stats.byQuadrant.production,icon:"\u2705",label:"Protect This Time"}),
              !buybackRate?e("div",{style:{marginTop:24,background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:12,padding:"16px 20px"}},
                e("p",{style:{margin:0,fontSize:13,color:"#93a3bf",lineHeight:1.5}}, e("strong",{style:{color:"#3b82f6"}},"Tip: "), "Set your Buyback Rate to see the dollar cost of your delegatable time.")
              ):null
            )
      ):null
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
