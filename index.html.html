<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Time Audit - Buyback Your Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    background: #0c0f14;
    color: #e2e4e9;
    -webkit-font-smoothing: antialiased;
  }
  input, select, button { font-family: inherit; }
  input:focus, select:focus { outline: 2px solid rgba(59,130,246,0.4); outline-offset: -1px; }
  button:hover { opacity: 0.88; }
  ::selection { background: rgba(59,130,246,0.3); }

  @media (max-width: 640px) {
    .grid-2col { grid-template-columns: 1fr !important; }
    .header-inner { flex-direction: column; align-items: flex-start !important; }
    .nav-row { flex-wrap: wrap; }
    .nav-row .spacer { display: none; }
    .metrics-grid { grid-template-columns: 1fr 1fr !important; }
    .form-grid { grid-template-columns: 1fr !important; }
    .entry-row { flex-wrap: wrap; gap: 8px !important; }
    .entry-meta { flex-wrap: wrap; gap: 6px !important; }
    .main-pad { padding: 16px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
const { useState, useMemo, useEffect, useCallback } = React;

const CATEGORIES = [
  "Sales & Prospecting","Client Meetings","Submissions & Marketing","Policy Servicing",
  "Account Management","Renewals","Claims","Admin / Email","Team Management","Strategy / Planning","Other"
];

const QUADRANT_INFO = {
  production: { label:"Production Zone", subtitle:"Keep & Protect", desc:"High value, high energy. This is your genius zone. Guard this time ruthlessly.", color:"#22c55e", bg:"rgba(34,197,94,0.08)", border:"rgba(34,197,94,0.25)" },
  delegation: { label:"Delegation Zone", subtitle:"Train & Hand Off", desc:"High value but drains you. Document SOPs and delegate to your team.", color:"#f59e0b", bg:"rgba(245,158,11,0.08)", border:"rgba(245,158,11,0.25)" },
  investment: { label:"Investment Zone", subtitle:"Develop & Grow", desc:"Energizes you but low value today. Could become your next production zone.", color:"#3b82f6", bg:"rgba(59,130,246,0.08)", border:"rgba(59,130,246,0.25)" },
  elimination: { label:"Elimination Zone", subtitle:"Stop or Outsource", desc:"Low value, low energy. Eliminate, automate, or delegate immediately.", color:"#ef4444", bg:"rgba(239,68,68,0.08)", border:"rgba(239,68,68,0.25)" }
};

const SAMPLE_ENTRIES = [
  { id:1, task:"Cold calling roofing contractors", category:"Sales & Prospecting", hours:1.5, energy:4, value:5, day:"Mon", date:"" },
  { id:2, task:"Processing certificates of insurance", category:"Policy Servicing", hours:2, energy:1, value:1, day:"Mon", date:"" },
  { id:3, task:"Renewal review meeting with client", category:"Renewals", hours:1, energy:4, value:5, day:"Mon", date:"" },
  { id:4, task:"Submitting GL app to markets", category:"Submissions & Marketing", hours:1.5, energy:3, value:4, day:"Tue", date:"" },
  { id:5, task:"Responding to endorsement requests", category:"Policy Servicing", hours:1, energy:1, value:2, day:"Tue", date:"" },
  { id:6, task:"Training team on renewal process", category:"Team Management", hours:1, energy:3, value:4, day:"Wed", date:"" },
  { id:7, task:"Inbox triage and follow-ups", category:"Admin / Email", hours:2, energy:1, value:2, day:"Wed", date:"" },
  { id:8, task:"Building prospect list for TX electricians", category:"Sales & Prospecting", hours:1, energy:4, value:5, day:"Thu", date:"" }
];

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function getQuadrant(energy, value) {
  const hi_e = energy >= 3, hi_v = value >= 3;
  if (hi_e && hi_v) return "production";
  if (!hi_e && hi_v) return "delegation";
  if (hi_e && !hi_v) return "investment";
  return "elimination";
}

function loadData() {
  try {
    const raw = localStorage.getItem("behr-time-audit");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData(entries, buybackRate) {
  try {
    localStorage.setItem("behr-time-audit", JSON.stringify({ entries, buybackRate, updated: new Date().toISOString() }));
  } catch(e) {}
}

function exportCSV(entries) {
  const header = "Task,Category,Day,Date,Hours,Energy,Value,Quadrant\n";
  const rows = entries.map(en => {
    const q = getQuadrant(en.energy, en.value);
    return ['"'+en.task.replace(/"/g,'""')+'"', en.category, en.day, en.date||"", en.hours, en.energy, en.value, q].join(",");
  }).join("\n");
  const blob = new Blob([header + rows], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "time-audit-" + new Date().toISOString().slice(0,10) + ".csv";
  a.click(); URL.revokeObjectURL(url);
}

// --- Components ---

function RatingDots(props) {
  const dots = [];
  for (let i = 0; i < 5; i++) {
    dots.push(e("button", {
      key: i,
      onClick: function() { props.onChange(i+1); },
      style: { width:24, height:24, borderRadius:"50%", border:"2px solid "+props.color, background: i < props.value ? props.color : "transparent", cursor:"pointer", transition:"all 0.15s", padding:0 }
    }));
  }
  return e("div", { style:{ display:"flex", gap:5 } }, dots);
}

function EntryRow(props) {
  const en = props.entry;
  const q = getQuadrant(en.energy, en.value);
  const info = QUADRANT_INFO[q];
  const qLabel = q === "production" ? "Keep" : q === "delegation" ? "Delegate" : q === "investment" ? "Develop" : "Eliminate";

  return e("div", { className:"entry-row", style:{ background:"#141820", borderRadius:10, padding:"14px 18px", display:"flex", alignItems:"center", gap:14, borderLeft:"3px solid "+info.color } },
    e("div", { style:{ flex:1, minWidth:0 } },
      e("div", { style:{ fontSize:14, fontWeight:600, color:"#e2e4e9" } }, en.task),
      e("div", { style:{ fontSize:12, color:"#6b7084", marginTop:3 } }, en.category, " · ", en.day, en.date ? " · "+en.date : "")
    ),
    e("div", { style:{ textAlign:"center", minWidth:50 } },
      e("div", { style:{ fontSize:16, fontWeight:700, fontFamily:"JetBrains Mono", color:"#fff" } }, en.hours+"h")
    ),
    e("div", { className:"entry-meta", style:{ display:"flex", gap:6, alignItems:"center" } },
      e("span", { style:{ fontSize:10, color:"#3b82f6", fontWeight:600 } }, "\u26A1"+en.energy),
      e("span", { style:{ fontSize:10, color:"#f59e0b", fontWeight:600 } }, "$"+en.value)
    ),
    e("div", { style:{ fontSize:10, fontWeight:700, color:info.color, background:info.bg, padding:"4px 8px", borderRadius:6, whiteSpace:"nowrap", textTransform:"uppercase", letterSpacing:"0.04em" } }, qLabel),
    e("button", { onClick: function(){ props.onEdit(en); }, style:{ background:"none", border:"none", color:"#6b7084", cursor:"pointer", fontSize:14, padding:4 }, title:"Edit" }, "\u270E"),
    e("button", { onClick: function(){ props.onDelete(en.id); }, style:{ background:"none", border:"none", color:"#6b7084", cursor:"pointer", fontSize:16, padding:4 }, title:"Delete" }, "\u00D7")
  );
}

function QuadrantCard(props) {
  const info = QUADRANT_INFO[props.qKey];
  const items = props.items;
  const hours = items.reduce(function(s, en){ return s + en.hours; }, 0);

  return e("div", { style:{ background:info.bg, border:"1px solid "+info.border, borderRadius:14, padding:20, minHeight:140 } },
    e("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4 } },
      e("h3", { style:{ margin:0, fontSize:15, fontWeight:700, color:info.color } }, info.label),
      e("span", { style:{ fontSize:13, fontWeight:700, color:info.color, fontFamily:"JetBrains Mono" } }, hours+"h")
    ),
    e("p", { style:{ margin:"0 0 14px", fontSize:11, color:"#8b8fa3", lineHeight:1.4 } }, info.subtitle, " \u2014 ", info.desc),
    items.length === 0
      ? e("div", { style:{ fontSize:12, color:"#555", fontStyle:"italic" } }, "No tasks logged here")
      : e("div", { style:{ display:"flex", flexDirection:"column", gap:6 } },
          items.map(function(item) {
            return e("div", { key:item.id, style:{ background:"rgba(0,0,0,0.25)", borderRadius:8, padding:"8px 12px", display:"flex", justifyContent:"space-between", alignItems:"center" } },
              e("span", { style:{ fontSize:13, color:"#e2e4e9", fontWeight:500 } }, item.task),
              e("span", { style:{ fontSize:12, fontWeight:700, fontFamily:"JetBrains Mono", color:"#8b8fa3" } }, item.hours+"h")
            );
          })
        )
  );
}

function ActionSection(props) {
  const info = QUADRANT_INFO[props.qKey];
  if (props.items.length === 0) return null;
  const hours = props.items.reduce(function(s,i){ return s+i.hours; },0);

  return e("div", { style:{ marginBottom:20 } },
    e("div", { style:{ fontSize:13, fontWeight:700, color:info.color, marginBottom:8 } }, props.icon, " ", props.label, " (", hours, "h)"),
    props.items.map(function(item) {
      return e("div", { key:item.id, style:{ background:info.bg, border:"1px solid "+info.border, borderRadius:10, padding:"12px 16px", marginBottom:6, display:"flex", justifyContent:"space-between" } },
        e("div", null,
          e("div", { style:{ fontSize:14, fontWeight:600, color:"#e2e4e9" } }, item.task),
          e("div", { style:{ fontSize:12, color:"#6b7084", marginTop:2 } }, item.category)
        ),
        e("div", { style:{ fontSize:14, fontWeight:700, fontFamily:"JetBrains Mono", color:info.color } }, item.hours+"h")
      );
    })
  );
}

// --- Main App ---

function App() {
  const saved = loadData();
  const [entries, setEntries] = useState(saved ? saved.entries || [] : []);
  const [buybackRate, setBuybackRate] = useState(saved ? saved.buybackRate || "" : "");
  const [view, setView] = useState("log");
  const [showForm, setShowForm] = useState(false);
  const [useSample, setUseSample] = useState(false);
  const [showRateCalc, setShowRateCalc] = useState(false);
  const [annualRevenue, setAnnualRevenue] = useState("");
  const [editingId, setEditingId] = useState(null);

  const [task, setTask] = useState("");
  const [category, setCategory] = useState(CATEGORIES[0]);
  const [hours, setHours] = useState("");
  const [energy, setEnergy] = useState(3);
  const [value, setValue] = useState(3);
  const [day, setDay] = useState("Mon");
  const [date, setDate] = useState(new Date().toISOString().slice(0,10));

  useEffect(function(){ saveData(entries, buybackRate); }, [entries, buybackRate]);

  const activeEntries = useSample && entries.length === 0 ? SAMPLE_ENTRIES : entries;

  const stats = useMemo(function() {
    var byQuadrant = { production:[], delegation:[], investment:[], elimination:[] };
    var totalHours = 0;
    activeEntries.forEach(function(en) {
      var q = getQuadrant(en.energy, en.value);
      byQuadrant[q].push(en);
      totalHours += en.hours;
    });
    var quadrantHours = {};
    Object.keys(byQuadrant).forEach(function(q) {
      quadrantHours[q] = byQuadrant[q].reduce(function(s,en){ return s + en.hours; }, 0);
    });
    return { byQuadrant:byQuadrant, quadrantHours:quadrantHours, totalHours:totalHours };
  }, [activeEntries]);

  function resetForm() {
    setTask(""); setCategory(CATEGORIES[0]); setHours(""); setEnergy(3); setValue(3); setDay("Mon");
    setDate(new Date().toISOString().slice(0,10)); setEditingId(null);
  }

  function addEntry() {
    if (!task || !hours) return;
    if (useSample && entries.length === 0) setUseSample(false);
    var entry = { task:task, category:category, hours:parseFloat(hours), energy:energy, value:value, day:day, date:date };
    if (editingId !== null) {
      setEntries(function(prev) { return prev.map(function(en) { return en.id === editingId ? Object.assign({}, en, entry) : en; }); });
    } else {
      entry.id = Date.now();
      setEntries(function(prev) { return prev.concat([entry]); });
    }
    resetForm(); setShowForm(false);
  }

  function editEntry(en) {
    setTask(en.task); setCategory(en.category); setHours(en.hours.toString()); setEnergy(en.energy);
    setValue(en.value); setDay(en.day); setDate(en.date || ""); setEditingId(en.id);
    setShowForm(true); setView("log");
  }

  function deleteEntry(id) {
    setEntries(function(prev) { return prev.filter(function(en) { return en.id !== id; }); });
  }

  function clearAll() {
    if (!confirm("Clear all logged tasks and your buyback rate? This can't be undone.")) return;
    setEntries([]); setBuybackRate(""); setUseSample(false);
    localStorage.removeItem("behr-time-audit");
  }

  function calcRate() {
    if (annualRevenue) {
      var rate = Math.round(parseFloat(annualRevenue) / 2080);
      setBuybackRate(rate.toString()); setShowRateCalc(false);
    }
  }

  // Input helper
  function inp(val, setter, placeholder, extraStyle) {
    return e("input", Object.assign({ value:val, onChange:function(ev){ setter(ev.target.value); }, placeholder:placeholder,
      style: Object.assign({ width:"100%", padding:"10px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.04)", color:"#fff", fontSize:14, fontFamily:"inherit" }, extraStyle || {})
    }));
  }

  function lbl(text, sub) {
    return e("label", { style:{ fontSize:11, fontWeight:600, color:"#6b7084", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom: sub ? 0 : 6 } },
      text,
      sub ? e("span", { style:{ color:"#8b8fa3", fontWeight:400, textTransform:"none", marginLeft:6 } }, sub) : null
    );
  }

  // Build tabs
  var tabs = [
    { key:"log", label:"Activity Log" },
    { key:"matrix", label:"Buyback Matrix" },
    { key:"summary", label:"Action Plan" }
  ];

  // --- RENDER ---
  return e("div", { style:{ minHeight:"100vh" } },

    // HEADER
    e("div", { style:{ background:"linear-gradient(135deg, #0c0f14 0%, #1a1f2e 100%)", borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"28px 32px 20px" } },
      e("div", { className:"header-inner", style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:16 } },
        e("div", null,
          e("h1", { style:{ margin:0, fontSize:26, fontWeight:700, letterSpacing:"-0.03em", color:"#fff" } }, "Time Audit"),
          e("p", { style:{ margin:"6px 0 0", fontSize:14, color:"#8b8fa3", fontWeight:400 } }, "Track your tasks. Find what to delegate, eliminate, or protect.")
        ),
        buybackRate ? e("div", { style:{ background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.2)", borderRadius:10, padding:"10px 16px", textAlign:"right" } },
          e("div", { style:{ fontSize:11, color:"#22c55e", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.05em" } }, "Buyback Rate"),
          e("div", { style:{ fontSize:22, fontWeight:700, color:"#22c55e", fontFamily:"JetBrains Mono" } }, "$"+parseInt(buybackRate).toLocaleString()+"/hr")
        ) : null
      ),

      // Nav
      e("div", { className:"nav-row", style:{ display:"flex", gap:4, marginTop:20, alignItems:"center" } },
        tabs.map(function(tab) {
          return e("button", { key:tab.key, onClick:function(){ setView(tab.key); },
            style:{ padding:"8px 18px", borderRadius:8, border:"none", background: view===tab.key ? "rgba(255,255,255,0.1)" : "transparent", color: view===tab.key ? "#fff" : "#6b7084", fontSize:13, fontWeight:600, cursor:"pointer" }
          }, tab.label);
        }),
        e("div", { className:"spacer", style:{ flex:1 } }),
        activeEntries.length > 0 ? e("button", { onClick:function(){ exportCSV(activeEntries); }, style:{ padding:"8px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"transparent", color:"#8b8fa3", fontSize:12, fontWeight:500, cursor:"pointer" } }, "\u2B07 Export CSV") : null,
        e("button", { onClick:function(){ setShowRateCalc(true); }, style:{ padding:"8px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"transparent", color:"#8b8fa3", fontSize:12, fontWeight:500, cursor:"pointer" } }, buybackRate ? "Recalculate Rate" : "Set Buyback Rate"),
        activeEntries.length > 0 ? e("button", { onClick:clearAll, style:{ padding:"8px 14px", borderRadius:8, border:"1px solid rgba(239,68,68,0.2)", background:"transparent", color:"#6b7084", fontSize:12, fontWeight:500, cursor:"pointer" } }, "Clear All") : null
      )
    ),

    // MAIN CONTENT
    e("div", { className:"main-pad", style:{ padding:"24px 32px", maxWidth:960, margin:"0 auto" } },

      // --- BUYBACK RATE MODAL ---
      showRateCalc ? e("div", { style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }, onClick:function(){ setShowRateCalc(false); } },
        e("div", { onClick:function(ev){ ev.stopPropagation(); }, style:{ background:"#1a1f2e", borderRadius:16, padding:32, width:400, maxWidth:"90vw", border:"1px solid rgba(255,255,255,0.08)" } },
          e("h3", { style:{ margin:"0 0 8px", fontSize:18, fontWeight:700, color:"#fff" } }, "Calculate Your Buyback Rate"),
          e("p", { style:{ margin:"0 0 20px", fontSize:13, color:"#8b8fa3", lineHeight:1.5 } }, "Your annual earnings divided by 2,080 working hours. Any task you can hire out for less than this rate should be delegated."),
          lbl("Annual Earnings (or target)"),
          e("div", { style:{ display:"flex", gap:10, marginTop:8 } },
            e("input", { type:"number", value:annualRevenue, onChange:function(ev){ setAnnualRevenue(ev.target.value); }, placeholder:"e.g. 250000",
              onKeyDown:function(ev){ if(ev.key==="Enter") calcRate(); },
              style:{ flex:1, padding:"10px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.12)", background:"rgba(255,255,255,0.04)", color:"#fff", fontSize:16, fontFamily:"JetBrains Mono" }
            }),
            e("button", { onClick:calcRate, style:{ padding:"10px 20px", borderRadius:8, border:"none", background:"#22c55e", color:"#000", fontWeight:700, fontSize:14, cursor:"pointer" } }, "Calculate")
          )
        )
      ) : null,

      // --- LOG VIEW ---
      view === "log" ? e("div", null,

        // Empty state
        activeEntries.length === 0 && !showForm ? e("div", { style:{ textAlign:"center", padding:"60px 20px", color:"#6b7084" } },
          e("div", { style:{ fontSize:40, marginBottom:16 } }, "\u23F1"),
          e("p", { style:{ fontSize:16, fontWeight:600, color:"#8b8fa3", margin:"0 0 8px" } }, "Start your 2-week time audit"),
          e("p", { style:{ fontSize:13, margin:"0 0 24px", lineHeight:1.6, maxWidth:420, marginLeft:"auto", marginRight:"auto" } }, "Log every task as you do it. For each, rate how much energy it gives you and how much revenue value it drives."),
          e("div", { style:{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap" } },
            e("button", { onClick:function(){ setShowForm(true); }, style:{ padding:"12px 24px", borderRadius:10, border:"none", background:"#22c55e", color:"#000", fontWeight:700, fontSize:14, cursor:"pointer" } }, "+ Log First Task"),
            e("button", { onClick:function(){ setUseSample(true); }, style:{ padding:"12px 24px", borderRadius:10, border:"1px solid rgba(255,255,255,0.12)", background:"transparent", color:"#8b8fa3", fontWeight:600, fontSize:14, cursor:"pointer" } }, "Load Sample Data")
          )
        ) : null,

        // Has entries or showing form
        (activeEntries.length > 0 || showForm) ? e("div", null,

          // Add button
          !showForm ? e("button", { onClick:function(){ resetForm(); setShowForm(true); }, style:{ padding:"10px 20px", borderRadius:10, border:"none", background:"#22c55e", color:"#000", fontWeight:700, fontSize:13, cursor:"pointer", marginBottom:20 } }, "+ Log Task") : null,

          // Form
          showForm ? e("div", { style:{ background:"#141820", borderRadius:14, padding:24, border:"1px solid rgba(255,255,255,0.08)", marginBottom:24 } },
            e("div", { className:"form-grid", style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 } },

              // Task
              e("div", { style:{ gridColumn:"1 / -1" } },
                lbl("What were you doing?"),
                inp(task, setTask, "e.g. Processing COIs for client")
              ),

              // Category
              e("div", null,
                lbl("Category"),
                e("select", { value:category, onChange:function(ev){ setCategory(ev.target.value); }, style:{ width:"100%", padding:"10px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"#0c0f14", color:"#e2e4e9", fontSize:14 } },
                  CATEGORIES.map(function(c){ return e("option", { key:c, value:c }, c); })
                )
              ),

              // Hours + Day + Date
              e("div", { style:{ display:"flex", gap:12 } },
                e("div", { style:{ flex:1 } },
                  lbl("Hours"),
                  e("input", { type:"number", step:"0.25", min:"0.25", value:hours, onChange:function(ev){ setHours(ev.target.value); }, placeholder:"1.5",
                    style:{ width:"100%", padding:"10px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.04)", color:"#fff", fontSize:14, fontFamily:"JetBrains Mono" }
                  })
                ),
                e("div", { style:{ flex:1 } },
                  lbl("Day"),
                  e("select", { value:day, onChange:function(ev){ setDay(ev.target.value); }, style:{ width:"100%", padding:"10px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"#0c0f14", color:"#e2e4e9", fontSize:14 } },
                    DAYS.map(function(d){ return e("option", { key:d, value:d }, d); })
                  )
                ),
                e("div", { style:{ flex:1 } },
                  lbl("Date"),
                  e("input", { type:"date", value:date, onChange:function(ev){ setDate(ev.target.value); },
                    style:{ width:"100%", padding:"10px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"#0c0f14", color:"#e2e4e9", fontSize:14 }
                  })
                )
              ),

              // Energy
              e("div", null,
                lbl("Energy Level", "(drains me \u2190 \u2192 fires me up)"),
                e("div", { style:{ marginTop:8 } }, e(RatingDots, { value:energy, onChange:setEnergy, color:"#3b82f6" }))
              ),

              // Value
              e("div", null,
                lbl("Revenue Value", "(low impact \u2190 \u2192 high impact)"),
                e("div", { style:{ marginTop:8 } }, e(RatingDots, { value:value, onChange:setValue, color:"#f59e0b" }))
              )
            ),

            // Form buttons
            e("div", { style:{ display:"flex", gap:10, marginTop:20 } },
              e("button", { onClick:addEntry, disabled:!task||!hours,
                style:{ padding:"10px 24px", borderRadius:8, border:"none", background: (task && hours) ? "#22c55e" : "#2a2f3a", color: (task && hours) ? "#000" : "#555", fontWeight:700, fontSize:13, cursor: (task && hours) ? "pointer" : "default" }
              }, editingId ? "Update Task" : "Add Task"),
              e("button", { onClick:function(){ setShowForm(false); resetForm(); }, style:{ padding:"10px 18px", borderRadius:8, border:"1px solid rgba(255,255,255,0.08)", background:"transparent", color:"#8b8fa3", fontWeight:500, fontSize:13, cursor:"pointer" } }, "Cancel")
            )
          ) : null,

          // Entry list
          e("div", { style:{ display:"flex", flexDirection:"column", gap:6 } },
            activeEntries.map(function(en) {
              return e(EntryRow, { key:en.id, entry:en, onEdit:editEntry, onDelete:deleteEntry });
            })
          )
        ) : null

      ) : null,

      // --- MATRIX VIEW ---
      view === "matrix" ? e("div", null,
        activeEntries.length === 0
          ? e("div", { style:{ textAlign:"center", padding:60, color:"#6b7084" } }, "Log some tasks first to see your matrix.")
          : e("div", null,

              // Bar
              stats.totalHours > 0 ? e("div", { style:{ marginBottom:24 } },
                e("div", { style:{ display:"flex", borderRadius:8, overflow:"hidden", height:32 } },
                  ["production","delegation","investment","elimination"].map(function(q) {
                    var pct = (stats.quadrantHours[q] / stats.totalHours) * 100;
                    if (pct === 0) return null;
                    return e("div", { key:q, style:{ width:pct+"%", background:QUADRANT_INFO[q].color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"#000", minWidth: pct > 8 ? "auto" : 0, overflow:"hidden" } }, pct > 10 ? Math.round(pct)+"%" : "");
                  })
                ),
                e("div", { style:{ display:"flex", gap:16, marginTop:10, flexWrap:"wrap" } },
                  ["production","delegation","investment","elimination"].map(function(q) {
                    return e("div", { key:q, style:{ display:"flex", alignItems:"center", gap:6 } },
                      e("div", { style:{ width:10, height:10, borderRadius:3, background:QUADRANT_INFO[q].color } }),
                      e("span", { style:{ fontSize:12, color:"#8b8fa3" } }, QUADRANT_INFO[q].label+": "+stats.quadrantHours[q]+"h")
                    );
                  })
                )
              ) : null,

              // Grid
              e("div", { className:"grid-2col", style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 } },
                ["production","delegation","investment","elimination"].map(function(q) {
                  return e(QuadrantCard, { key:q, qKey:q, items:stats.byQuadrant[q] });
                })
              )
            )
      ) : null,

      // --- SUMMARY VIEW ---
      view === "summary" ? e("div", null,
        activeEntries.length === 0
          ? e("div", { style:{ textAlign:"center", padding:60, color:"#6b7084" } }, "Log some tasks first to see your action plan.")
          : e("div", null,

              // Metrics
              e("div", { className:"metrics-grid", style:{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))", gap:12, marginBottom:28 } },
                e("div", { style:{ background:"#141820", borderRadius:12, padding:"18px 20px" } },
                  e("div", { style:{ fontSize:11, color:"#6b7084", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.05em" } }, "Total Hours Tracked"),
                  e("div", { style:{ fontSize:28, fontWeight:700, color:"#fff", fontFamily:"JetBrains Mono" } }, stats.totalHours)
                ),
                e("div", { style:{ background:"#141820", borderRadius:12, padding:"18px 20px" } },
                  e("div", { style:{ fontSize:11, color:"#ef4444", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.05em" } }, "Hours to Reclaim"),
                  e("div", { style:{ fontSize:28, fontWeight:700, color:"#ef4444", fontFamily:"JetBrains Mono" } }, stats.quadrantHours.elimination + stats.quadrantHours.delegation)
                ),
                e("div", { style:{ background:"#141820", borderRadius:12, padding:"18px 20px" } },
                  e("div", { style:{ fontSize:11, color:"#22c55e", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.05em" } }, "Production Zone %"),
                  e("div", { style:{ fontSize:28, fontWeight:700, color:"#22c55e", fontFamily:"JetBrains Mono" } }, stats.totalHours > 0 ? Math.round((stats.quadrantHours.production / stats.totalHours)*100)+"%" : "0%")
                ),
                buybackRate ? e("div", { style:{ background:"#141820", borderRadius:12, padding:"18px 20px" } },
                  e("div", { style:{ fontSize:11, color:"#f59e0b", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.05em" } }, "Cost of Delegatable Time"),
                  e("div", { style:{ fontSize:28, fontWeight:700, color:"#f59e0b", fontFamily:"JetBrains Mono" } }, "$"+((stats.quadrantHours.elimination + stats.quadrantHours.delegation) * parseInt(buybackRate)).toLocaleString())
                ) : null
              ),

              // Actions
              e("h3", { style:{ fontSize:16, fontWeight:700, color:"#fff", margin:"0 0 14px" } }, "Immediate Actions"),
              e(ActionSection, { qKey:"elimination", items:stats.byQuadrant.elimination, icon:"\uD83D\uDED1", label:"Eliminate or Outsource" }),
              e(ActionSection, { qKey:"delegation", items:stats.byQuadrant.delegation, icon:"\uD83D\uDD04", label:"Delegate with SOPs" }),
              e(ActionSection, { qKey:"production", items:stats.byQuadrant.production, icon:"\u2705", label:"Protect This Time" }),

              !buybackRate ? e("div", { style:{ marginTop:24, background:"rgba(59,130,246,0.08)", border:"1px solid rgba(59,130,246,0.2)", borderRadius:12, padding:"16px 20px" } },
                e("p", { style:{ margin:0, fontSize:13, color:"#93a3bf", lineHeight:1.5 } },
                  e("strong", { style:{ color:"#3b82f6" } }, "Tip: "),
                  "Set your Buyback Rate to see exactly how much your delegatable time is costing you. That number makes the business case for your next hire crystal clear."
                )
              ) : null
            )
      ) : null
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
